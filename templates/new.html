<body>

<div class="container">
  
  <br><br>
  <form class="form-horizontal" action="/submit" method="post" enctype="multipart/form-data">

    <div class="form-group">
      
      <label class="control-label col-sm-2" for="pwd">Upload Your Image :<p style="color:hsl(0,100%,50%);">(Please upload the histopathological lung tissue image)</p></label>
      <div class="col-sm-10">          
        <input type="file" class="form-control" placeholder="Hours Studied"  name="my_image" id="pwd">
      </div>
    </div>

    <div class="form-group">        
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-success">Submit</button>
      </div>
    </div>
  </form>

	{% if prediction %}
  <img src="{{img_path}}" height="400px" width="400px">
	<h2> Result   : <i> {{prediction}} </i></h2>

	{% endif %}
