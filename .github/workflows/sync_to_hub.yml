name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

  # Manually trigger the workflow
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hub
        uses: nateraw/huggingface-sync-action@v1
        with:
          github_repo_id: hyshot/flask-tensorflow-project
          huggingface_repo_id: hyshot/senior-lung-proj
          repo_type: space
          token: ${{ secrets.HF_TOKEN }}
